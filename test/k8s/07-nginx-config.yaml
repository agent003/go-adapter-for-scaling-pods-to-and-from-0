apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: ollama-test
data:
  nginx.conf: |
    worker_processes auto;
    error_log /dev/stderr info;
    events { worker_connections 1024; }

    http {
        access_log /dev/stdout;
        sendfile on;

        # Streaming-friendly defaults: don't buffer either direction so
        # Ollama's line-delimited JSON reaches the client immediately.
        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_http_version      1.1;
        proxy_read_timeout      600s;
        proxy_send_timeout      600s;

        # Resolver for in-cluster DNS lookups; CoreDNS lives at this IP.
        resolver 10.96.0.10 valid=30s ipv6=off;
        resolver_timeout 5s;

        upstream gateway_backend {
            server ollama-gateway-svc:443;
            keepalive 16;
        }

        server {
            listen 443 ssl;
            http2 on;
            server_name _;

            ssl_certificate     /etc/nginx/certs/server.crt;
            ssl_certificate_key /etc/nginx/certs/server.key;
            ssl_protocols       TLSv1.2 TLSv1.3;

            location = /healthz {
                access_log off;
                return 200 "ok\n";
                add_header Content-Type text/plain;
            }

            # /llama/<path> -> https://ollama-gateway-svc:443/<path>
            # The trailing slash on both the location and proxy_pass strips
            # the /llama prefix before forwarding.
            location /llama/ {
                proxy_ssl_certificate         /etc/nginx/certs/client.crt;
                proxy_ssl_certificate_key     /etc/nginx/certs/client.key;
                proxy_ssl_trusted_certificate /etc/nginx/certs/ca.crt;
                proxy_ssl_verify        on;
                proxy_ssl_verify_depth  2;
                proxy_ssl_server_name   on;
                proxy_ssl_name          ollama-gateway-svc;
                proxy_ssl_protocols     TLSv1.2 TLSv1.3;

                proxy_set_header Host              ollama-gateway-svc;
                proxy_set_header X-Real-IP         $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;

                proxy_pass https://gateway_backend/;
            }
        }
    }
