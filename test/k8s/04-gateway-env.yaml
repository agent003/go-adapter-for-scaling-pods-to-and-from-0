apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-env
  namespace: ollama-test
data:
  # ----- Worker target -----
  DEPLOYMENT_NAME: "ollama-worker"
  NAMESPACE: "ollama-test"
  OLLAMA_SERVICE_URL: "https://ollama-worker-svc:443"

  # ----- Scale-to-zero (short for fast cold-start retesting) -----
  IDLE_TIMEOUT: "2m"
  IDLE_CHECK_INTERVAL: "20s"

  # ----- Cold-start -----
  READY_TIMEOUT: "3m"
  POLL_INTERVAL: "2s"

  # ----- Rate limit -----
  RATE_LIMIT_RPS: "5"
  RATE_LIMIT_BURST: "10"

  # ----- HTTP server -----
  LISTEN_ADDR: ":8080"
  LOG_LEVEL: "debug"
  SHUTDOWN_TIMEOUT: "30s"

  # ----- Upstream TLS (verifies the worker's caddy sidecar) -----
  UPSTREAM_CA_CERT: "/etc/upstream-certs/ca.crt"
  UPSTREAM_SERVER_NAME: "ollama-worker-svc"
  UPSTREAM_INSECURE_SKIP_VERIFY: "false"
