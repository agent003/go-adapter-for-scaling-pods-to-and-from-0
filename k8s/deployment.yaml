apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-gateway
  labels:
    app: ollama-gateway
    app.kubernetes.io/name: ollama-gateway
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: ollama-gateway
  template:
    metadata:
      labels:
        app: ollama-gateway
        app.kubernetes.io/name: ollama-gateway
        app.kubernetes.io/component: gateway
    spec:
      serviceAccountName: ollama-scaler-sa
      # Long enough for in-flight cold-starts/streams to drain on rollout.
      terminationGracePeriodSeconds: 60
      automountServiceAccountToken: true
      containers:
        - name: caddy-proxy
          image: <your-registry>/caddy-sidecar:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: https
              containerPort: 443
              protocol: TCP
          envFrom:
            - configMapRef:
                name: proxy-config
          # mTLS makes an HTTP probe impractical; a TCP probe is enough to
          # detect a dead listener.
          livenessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              # Required so a non-root caddy can bind :443.
              add: ["NET_BIND_SERVICE"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: certs
              mountPath: /etc/certs
              readOnly: true
            - name: caddy-data
              mountPath: /data
            - name: caddy-config
              mountPath: /config

        - name: go-proxy
          image: <your-registry>/go-proxy:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: proxy-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault

      volumes:
        - name: certs
          secret:
            secretName: ollama-mtls-certs
        # Caddy needs writable /data and /config; emptyDir keeps the rootfs
        # free of state and allows readOnlyRootFilesystem-style hardening
        # without forcing it on the caddy image.
        - name: caddy-data
          emptyDir: {}
        - name: caddy-config
          emptyDir: {}
