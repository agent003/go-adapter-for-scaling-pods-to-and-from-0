apiVersion: v1
kind: Service
metadata:
  name: ollama-gateway-svc
  labels:
    app.kubernetes.io/name: ollama-gateway
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  selector:
    app: ollama-gateway
  ports:
    - name: https
      protocol: TCP
      port: 443
      targetPort: https
